name: Update Visual Snapshots

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to update screenshots on'
        required: true
        default: 'main'

permissions:
  contents: write

jobs:
  update-screenshots:
    name: Update Visual Test Screenshots
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Update visual snapshots
        run: pnpm exec playwright test e2e/tests/visual/ --update-snapshots || true
        env:
          NEXT_PUBLIC_DAEMON_URL: http://localhost:50051
          NEXT_PUBLIC_DOCS_URL: https://docs.centy.io
          NEXT_PUBLIC_DAEMON_INSTALL_URL: https://github.com/centy-io/installer/releases/latest/download/install.sh
          NEXT_PUBLIC_CORS_DOCS_URL: https://app.centy.io
          NEXT_PUBLIC_GOOGLE_ANALYTICS_URL: https://www.googletagmanager.com/gtag/js?id=G-ZV5SD70Z2D
          NEXT_PUBLIC_SENTRY_DSN: https://98aef6a0676becdbe5b6a8a8ee14b8d3@o4510682522976256.ingest.de.sentry.io/4510682527367248

      - name: Check for changes
        id: git-check
        run: |
          find app -name "*.png" -path "*/screenshot/*" -exec git add {} \;
          git diff --cached --exit-code -- "*.png" || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit updated screenshots
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "chore: update visual test screenshots from CI

          🤖 Generated with [Claude Code](https://claude.com/claude-code)

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          HUSKY=0 git push

      - name: No changes detected
        if: steps.git-check.outputs.changes != 'true'
        run: echo "No screenshot changes detected"
