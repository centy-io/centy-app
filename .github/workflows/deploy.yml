name: Deploy to Cloudflare Pages

on:
  workflow_run:
    workflows: ['CI']
    branches: [main]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          COMMIT_SHA: ${{ github.sha }}
          NEXT_PUBLIC_DAEMON_URL: http://localhost:50051
          NEXT_PUBLIC_DOCS_URL: https://docs.centy.io
          NEXT_PUBLIC_DAEMON_INSTALL_URL: https://github.com/centy-io/installer/releases/latest/download/install.sh
          NEXT_PUBLIC_CORS_DOCS_URL: https://app.centy.io
          NEXT_PUBLIC_GOOGLE_ANALYTICS_URL: https://www.googletagmanager.com/gtag/js?id=G-ZV5SD70Z2D
          NEXT_PUBLIC_SENTRY_DSN: https://98aef6a0676becdbe5b6a8a8ee14b8d3@o4510682522976256.ingest.de.sentry.io/4510682527367248

      - name: Deploy to Cloudflare Pages
        run: pnpm exec wrangler pages deploy out --project-name=centy-app
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
